<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="1100" fill="#0d1117"/>

  <!-- ── TITLE ─────────────────────────────────────── -->
  <text x="400" y="46" fill="#e2e8f0" font-size="24" font-weight="bold" text-anchor="middle">NovaDesk RAG Pipeline</text>
  <text x="400" y="70" fill="#64748b" font-size="13" text-anchor="middle">DSPy · ChromaDB · Ollama · sentence-transformers</text>

  <!-- ── NODE 1 — Knowledge Base ───────────────────── -->
  <rect x="50" y="92"  width="700" height="105" rx="12" fill="#131929" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="50" y="92"  width="6"   height="105" rx="3"  fill="#3b82f6"/>
  <!-- badge -->
  <rect x="68" y="84" width="58" height="17" rx="8" fill="#3b82f6"/>
  <text x="97" y="96" fill="white" font-size="9.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">STEP 1</text>
  <!-- title -->
  <text x="80" y="122" fill="#e2e8f0" font-size="14" font-weight="bold">Knowledge Base</text>
  <text x="745" y="122" fill="#3b82f6" font-size="10.5" text-anchor="end">knowledge_base.txt</text>
  <!-- desc -->
  <text x="80" y="143" fill="#94a3b8" font-size="11.5">Raw NovaDesk product documentation — 10 sections covering pricing,</text>
  <text x="80" y="159" fill="#94a3b8" font-size="11.5">billing, tickets, live chat, integrations, security and troubleshooting.</text>
  <!-- tags -->
  <rect x="80"  y="170" width="70" height="16" rx="8" fill="#1e3a5f" opacity="0.8"/>
  <text x="115" y="181" fill="#93c5fd" font-size="9.5" text-anchor="middle">10 sections</text>
  <rect x="158" y="170" width="60" height="16" rx="8" fill="#1e3a5f" opacity="0.8"/>
  <text x="188" y="181" fill="#93c5fd" font-size="9.5" text-anchor="middle">plain text</text>
  <rect x="226" y="170" width="68" height="16" rx="8" fill="#1e3a5f" opacity="0.8"/>
  <text x="260" y="181" fill="#93c5fd" font-size="9.5" text-anchor="middle">~270 lines</text>

  <!-- ── ARROW 1 ─────────────────────────────────── -->
  <line x1="400" y1="197" x2="400" y2="225" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="393,225 407,225 400,237" fill="#10b981" opacity="0.8"/>
  <text x="420" y="220" fill="#475569" font-size="10.5">chunk · embed · store</text>

  <!-- ── NODE 2 — Ingest ───────────────────────────── -->
  <rect x="50" y="240" width="700" height="105" rx="12" fill="#0f1f1a" stroke="#10b981" stroke-width="1.5"/>
  <rect x="50" y="240" width="6"   height="105" rx="3"  fill="#10b981"/>
  <rect x="68" y="232" width="58" height="17" rx="8" fill="#10b981"/>
  <text x="97" y="244" fill="white" font-size="9.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">STEP 2</text>
  <text x="80" y="270" fill="#e2e8f0" font-size="14" font-weight="bold">Ingest &amp; Embed</text>
  <text x="745" y="270" fill="#10b981" font-size="10.5" text-anchor="end">src/ingest.py</text>
  <text x="80" y="291" fill="#94a3b8" font-size="11.5">Splits text into 80-word chunks (15-word overlap). Each chunk is</text>
  <text x="80" y="307" fill="#94a3b8" font-size="11.5">converted into a 384-dim vector using all-MiniLM-L6-v2 embeddings.</text>
  <rect x="80"  y="318" width="62" height="16" rx="8" fill="#052e16" opacity="0.8"/>
  <text x="111" y="329" fill="#6ee7b7" font-size="9.5" text-anchor="middle">25 chunks</text>
  <rect x="150" y="318" width="80" height="16" rx="8" fill="#052e16" opacity="0.8"/>
  <text x="190" y="329" fill="#6ee7b7" font-size="9.5" text-anchor="middle">80-word window</text>
  <rect x="238" y="318" width="112" height="16" rx="8" fill="#052e16" opacity="0.8"/>
  <text x="294" y="329" fill="#6ee7b7" font-size="9.5" text-anchor="middle">all-MiniLM-L6-v2</text>

  <!-- ── ARROW 2 ─────────────────────────────────── -->
  <line x1="400" y1="345" x2="400" y2="373" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="393,373 407,373 400,385" fill="#8b5cf6" opacity="0.8"/>
  <text x="420" y="368" fill="#475569" font-size="10.5">store embeddings</text>

  <!-- ── NODE 3 — ChromaDB ─────────────────────────── -->
  <rect x="50" y="388" width="700" height="105" rx="12" fill="#160f29" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="50" y="388" width="6"   height="105" rx="3"  fill="#8b5cf6"/>
  <rect x="68" y="380" width="58" height="17" rx="8" fill="#8b5cf6"/>
  <text x="97" y="392" fill="white" font-size="9.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">STEP 3</text>
  <text x="80" y="418" fill="#e2e8f0" font-size="14" font-weight="bold">ChromaDB Vector Store</text>
  <text x="745" y="418" fill="#8b5cf6" font-size="10.5" text-anchor="end">chroma_db/</text>
  <text x="80" y="439" fill="#94a3b8" font-size="11.5">Local database holding all 25 chunk embeddings. Finds the most</text>
  <text x="80" y="455" fill="#94a3b8" font-size="11.5">semantically similar chunks to any incoming question — no keywords needed.</text>
  <rect x="80"  y="466" width="104" height="16" rx="8" fill="#2e1065" opacity="0.8"/>
  <text x="132" y="477" fill="#c4b5fd" font-size="9.5" text-anchor="middle">semantic search</text>
  <rect x="192" y="466" width="104" height="16" rx="8" fill="#2e1065" opacity="0.8"/>
  <text x="244" y="477" fill="#c4b5fd" font-size="9.5" text-anchor="middle">cosine similarity</text>
  <rect x="304" y="466" width="88" height="16" rx="8" fill="#2e1065" opacity="0.8"/>
  <text x="348" y="477" fill="#c4b5fd" font-size="9.5" text-anchor="middle">local — no cloud</text>

  <!-- ── ARROW 3 ─────────────────────────────────── -->
  <line x1="400" y1="493" x2="400" y2="521" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="393,521 407,521 400,533" fill="#84cc16" opacity="0.8"/>
  <text x="420" y="516" fill="#475569" font-size="10.5">top-4 relevant chunks</text>

  <!-- ── NODE 4 — Retriever ────────────────────────── -->
  <rect x="50" y="536" width="700" height="105" rx="12" fill="#111a0a" stroke="#84cc16" stroke-width="1.5"/>
  <rect x="50" y="536" width="6"   height="105" rx="3"  fill="#84cc16"/>
  <rect x="68" y="528" width="58" height="17" rx="8" fill="#84cc16"/>
  <text x="97" y="540" fill="white" font-size="9.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">STEP 4</text>
  <text x="80" y="566" fill="#e2e8f0" font-size="14" font-weight="bold">Retriever</text>
  <text x="745" y="566" fill="#84cc16" font-size="10.5" text-anchor="end">src/retriever.py</text>
  <text x="80" y="587" fill="#94a3b8" font-size="11.5">Converts the question into an embedding, queries ChromaDB, and returns</text>
  <text x="80" y="603" fill="#94a3b8" font-size="11.5">the top 4 most relevant passages as context for the LLM.</text>
  <rect x="80"  y="614" width="86" height="16" rx="8" fill="#1a2e00" opacity="0.8"/>
  <text x="123" y="625" fill="#bef264" font-size="9.5" text-anchor="middle">NovaRetriever</text>
  <rect x="174" y="614" width="56" height="16" rx="8" fill="#1a2e00" opacity="0.8"/>
  <text x="202" y="625" fill="#bef264" font-size="9.5" text-anchor="middle">k = 4</text>
  <rect x="238" y="614" width="90" height="16" rx="8" fill="#1a2e00" opacity="0.8"/>
  <text x="283" y="625" fill="#bef264" font-size="9.5" text-anchor="middle">dspy.Retrieve</text>

  <!-- ── ARROW 4 ─────────────────────────────────── -->
  <line x1="400" y1="641" x2="400" y2="669" stroke="#84cc16" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="393,669 407,669 400,681" fill="#f97316" opacity="0.8"/>
  <text x="420" y="664" fill="#475569" font-size="10.5">question + context → LLM</text>

  <!-- ── NODE 5 — Pipeline ─────────────────────────── -->
  <rect x="50" y="684" width="700" height="105" rx="12" fill="#1f110a" stroke="#f97316" stroke-width="1.5"/>
  <rect x="50" y="684" width="6"   height="105" rx="3"  fill="#f97316"/>
  <rect x="68" y="676" width="58" height="17" rx="8" fill="#f97316"/>
  <text x="97" y="688" fill="white" font-size="9.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">STEP 5</text>
  <text x="80" y="714" fill="#e2e8f0" font-size="14" font-weight="bold">RAG Pipeline — Generate Answer</text>
  <text x="745" y="714" fill="#f97316" font-size="10.5" text-anchor="end">src/pipeline.py</text>
  <text x="80" y="735" fill="#94a3b8" font-size="11.5">Sends question + retrieved chunks to llama3. Uses Chain-of-Thought so</text>
  <text x="80" y="751" fill="#94a3b8" font-size="11.5">the model reasons step-by-step before answering. Retries on echo bug.</text>
  <rect x="80"  y="762" width="94" height="16" rx="8" fill="#3d1500" opacity="0.8"/>
  <text x="127" y="773" fill="#fdba74" font-size="9.5" text-anchor="middle">ChainOfThought</text>
  <rect x="182" y="762" width="70" height="16" rx="8" fill="#3d1500" opacity="0.8"/>
  <text x="217" y="773" fill="#fdba74" font-size="9.5" text-anchor="middle">llama3 local</text>
  <rect x="260" y="762" width="96" height="16" rx="8" fill="#3d1500" opacity="0.8"/>
  <text x="308" y="773" fill="#fdba74" font-size="9.5" text-anchor="middle">retry on echo bug</text>

  <!-- ── ARROW 5 ─────────────────────────────────── -->
  <line x1="400" y1="789" x2="400" y2="817" stroke="#f97316" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="393,817 407,817 400,829" fill="#06b6d4" opacity="0.8"/>
  <text x="420" y="812" fill="#475569" font-size="10.5">evaluate → learn → improve</text>

  <!-- ── NODE 6 — Optimizer ────────────────────────── -->
  <rect x="50" y="832" width="700" height="105" rx="12" fill="#071f22" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="50" y="832" width="6"   height="105" rx="3"  fill="#06b6d4"/>
  <rect x="68" y="824" width="58" height="17" rx="8" fill="#06b6d4"/>
  <text x="97" y="836" fill="white" font-size="9.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">STEP 6</text>
  <text x="80" y="862" fill="#e2e8f0" font-size="14" font-weight="bold">BootstrapFewShot Optimizer</text>
  <text x="745" y="862" fill="#06b6d4" font-size="10.5" text-anchor="end">src/optimize.py</text>
  <text x="80" y="883" fill="#94a3b8" font-size="11.5">Runs pipeline on 20 training Q&amp;As, picks the 4 best reasoning traces,</text>
  <text x="80" y="899" fill="#94a3b8" font-size="11.5">and injects them as few-shot demos so the LLM learns to reason better.</text>
  <rect x="80"  y="910" width="112" height="16" rx="8" fill="#022c33" opacity="0.8"/>
  <text x="136" y="921" fill="#67e8f9" font-size="9.5" text-anchor="middle">20 train examples</text>
  <rect x="200" y="910" width="94" height="16" rx="8" fill="#022c33" opacity="0.8"/>
  <text x="247" y="921" fill="#67e8f9" font-size="9.5" text-anchor="middle">4 demos selected</text>
  <rect x="302" y="910" width="108" height="16" rx="8" fill="#022c33" opacity="0.8"/>
  <text x="356" y="921" fill="#67e8f9" font-size="9.5" text-anchor="middle">auto prompt rewrite</text>

  <!-- ── RESULTS BAR ────────────────────────────────── -->
  <rect x="50" y="960" width="700" height="108" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
  <text x="80" y="985" fill="#64748b" font-size="10.5" font-weight="bold" letter-spacing="1">DEVSET ACCURACY RESULTS</text>

  <!-- Baseline -->
  <text x="80"  y="1008" fill="#94a3b8" font-size="11">Baseline (no optimization)</text>
  <rect x="80"  y="1014" width="520" height="12" rx="6" fill="#1e293b"/>
  <rect x="80"  y="1014" width="468" height="12" rx="6" fill="#f59e0b"/>
  <text x="612" y="1025" fill="#f59e0b" font-size="12" font-weight="bold">90%</text>

  <!-- Optimized -->
  <text x="80"  y="1047" fill="#94a3b8" font-size="11">Optimized (BootstrapFewShot)</text>
  <rect x="80"  y="1053" width="520" height="12" rx="6" fill="#1e293b"/>
  <rect x="80"  y="1053" width="520" height="12" rx="6" fill="#22c55e"/>
  <text x="612" y="1064" fill="#22c55e" font-size="12" font-weight="bold">100% ✓</text>

  <!-- Footer -->
  <text x="400" y="1090" fill="#334155" font-size="10" text-anchor="middle">github.com/sital-tharu/dspy-novadesk-rag  ·  Built with DSPy</text>

</svg>
